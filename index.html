<!DOCTYPE html>
<html>
<head>
  <title>AI House Predictor</title>

  <!-- React via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (to run JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body style="font-family: Arial; padding: 40px;">

<div id="root"></div>

<script type="text/babel">

function App() {
  const [form, setForm] = React.useState({
    MedInc: "",
    HouseAge: "",
    AveRooms: "",
    AveBedrms: "",
    Population: "",
    AveOccup: "",
    Latitude: "",
    Longitude: ""
  });

  const [result, setResult] = React.useState("");

  const handleChange = (e) => {
    setForm({...form, [e.target.name]: e.target.value});
  };

  const predict = async () => {
    const data = Object.fromEntries(
      Object.entries(form).map(([k, v]) => [k, parseFloat(v)])
    );

    try {
      const res = await fetch("https://house-ai-app2.onrender.com/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": "mysecret123"
        },
        body: JSON.stringify(data)
      });

      const json = await res.json();

      if (json.predicted_price) {
        setResult("💰 $" + json.predicted_price);
      } else {
        setResult("❌ " + json.error);
      }

    } catch {
      setResult("⚠️ API Error");
    }
  };

  return (
    <div>
      <h1>🏠 AI House Price Predictor</h1>

      {Object.keys(form).map((key) => (
        <div key={key}>
          <input
            name={key}
            placeholder={key}
            value={form[key]}
            onChange={handleChange}
          />
        </div>
      ))}

      <br />
      <button onClick={predict}>Predict</button>

      <h2>{result}</h2>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
