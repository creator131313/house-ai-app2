<!DOCTYPE html>
<html>
<head>
    <title>🏠 AI House Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🏠 House Price Predictor</h2>

    <input id="MedInc" placeholder="MedInc">
    <input id="HouseAge" placeholder="HouseAge">
    <input id="AveRooms" placeholder="AveRooms">
    <input id="AveBedrms" placeholder="AveBedrms">
    <input id="Population" placeholder="Population">
    <input id="AveOccup" placeholder="AveOccup">
    <input id="Latitude" placeholder="Latitude">
    <input id="Longitude" placeholder="Longitude">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script>
async function predict() {
    let data = {
        MedInc: parseFloat(document.getElementById("MedInc").value),
        HouseAge: parseFloat(document.getElementById("HouseAge").value),
        AveRooms: parseFloat(document.getElementById("AveRooms").value),
        AveBedrms: parseFloat(document.getElementById("AveBedrms").value),
        Population: parseFloat(document.getElementById("Population").value),
        AveOccup: parseFloat(document.getElementById("AveOccup").value),
        Latitude: parseFloat(document.getElementById("Latitude").value),
        Longitude: parseFloat(document.getElementById("Longitude").value)
    };

    let response = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    let result = await response.json();

    document.getElementById("result").innerText =
        "💰 Predicted Price: $" + result.predicted_price;
}
</script>

</body>
</html>
