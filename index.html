<!DOCTYPE html>
<html>
<head>
  <title>AI House Price Predictor</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: #f5f7fa;">

<div id="root"></div>

<script type="text/babel">

function App() {
  const [form, setForm] = React.useState({
    MedInc: "", HouseAge: "", AveRooms: "", AveBedrms: "",
    Population: "", AveOccup: "", Latitude: "", Longitude: ""
  });

  const [result, setResult] = React.useState("");
  const [loading, setLoading] = React.useState(false);

  const handleChange = (e) => {
    setForm({...form, [e.target.name]: e.target.value});
  };

  const predict = async () => {
    setLoading(true);

    const data = Object.fromEntries(
      Object.entries(form).map(([k, v]) => [k, parseFloat(v)])
    );

    try {
      const res = await fetch("https://house-ai-app2.onrender.com/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": "mysecret123"
        },
        body: JSON.stringify(data)
      });

      const json = await res.json();
      console.log(json);

      if (json.predicted_price !== undefined) {
        setResult("💰 Estimated Price: $" + json.predicted_price);
      } else {
        setResult("❌ " + json.error);
      }

    } catch {
      setResult("⚠️ API Error");
    }

    setLoading(false);
  };

  return (
    <div className="container mt-5">

      <div className="card shadow p-4">
        <h2 className="text-center mb-4">🏠 AI House Price Predictor</h2>

        <div className="row">
          {Object.keys(form).map((key) => (
            <div className="col-md-6 mb-3" key={key}>
              <input
                className="form-control"
                name={key}
                placeholder={key}
                value={form[key]}
                onChange={handleChange}
              />
            </div>
          ))}
        </div>

        <div className="text-center">
          <button className="btn btn-primary px-4" onClick={predict}>
            {loading ? "Predicting..." : "Predict"}
          </button>
        </div>

        {result && (
          <div className="alert alert-success mt-4 text-center">
            {result}
          </div>
        )}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
